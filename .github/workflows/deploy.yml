name: Deploy til GitHub Pages

# Publiserer siden på hver push til main. Eneste behandling: cache-busting av CSS/JS.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Rettigheter Pages-deploy trenger
permissions:
  contents: read
  pages: write
  id-token: write

# Kjør én deploy om gangen; avbryt eldre kjøringer i kø
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      # Bytt ?v=dev mot commit-SHA-en, så nettlesere aldri serverer utdatert CSS/JS
      - name: Cache-bust CSS/JS
        run: sed -i "s/?v=dev/?v=${GITHUB_SHA::8}/g" index.html

      - name: Sett opp Pages
        uses: actions/configure-pages@v5

      - name: Pakke opp artefakt (hele rota)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
